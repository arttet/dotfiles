###
# Core settings
###

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -s escape-time 0
set -s set-clipboard on
set -g mouse on
set -g prefix C-a
set-option -g detach-on-destroy off

bind s choose-tree -Zs -O name
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

###
# Keyboard shortcuts
###

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "⚡ Config reloaded!"

unbind '%'
bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "\\" split-window -fh -c "#{pane_current_path}"

unbind '"'
bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"

bind c new-window -c "#{pane_current_path}"
bind Space last-window
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Clear bindings left in servers that loaded the former Harpoon configuration.
unbind H
unbind -a -T harpoon

# Popup tools inherit the active pane's working directory.
bind C-y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi"
bind C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "nu --login --interactive"
bind C-g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind -n M-y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi"
bind -n M-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "nu --login --interactive"
bind -n M-g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# Keep the default prefix+d detach binding; use prefix+e for config editing.
bind e display-menu -T "#[align=centre]Config" -x C -y C \
  "Nushell config" n "display-popup -w 90% -h 90% -E 'hx #{HOME}/.config/nushell/config.nu'" \
  "Nushell environment" E "display-popup -w 90% -h 90% -E 'hx #{HOME}/.config/nushell/env.nu'" \
  "Tmux" t "display-popup -w 90% -h 90% -E 'hx #{HOME}/.config/tmux/tmux.conf'" \
  "Yazi" y "display-popup -w 90% -h 90% -E 'hx #{HOME}/.config/yazi/yazi.toml'" \
  "Lazygit" g "display-popup -w 90% -h 90% -E 'hx #{HOME}/.config/lazygit/config.yml'" \
  "Quit" q ""
bind -n M-e display-menu -T "#[align=centre]Config" -x C -y C \
  "Nushell config" n "display-popup -w 90% -h 90% -E 'hx #{HOME}/.config/nushell/config.nu'" \
  "Nushell environment" E "display-popup -w 90% -h 90% -E 'hx #{HOME}/.config/nushell/env.nu'" \
  "Tmux" t "display-popup -w 90% -h 90% -E 'hx #{HOME}/.config/tmux/tmux.conf'" \
  "Yazi" y "display-popup -w 90% -h 90% -E 'hx #{HOME}/.config/yazi/yazi.toml'" \
  "Lazygit" g "display-popup -w 90% -h 90% -E 'hx #{HOME}/.config/lazygit/config.yml'" \
  "Quit" q ""

###
# Copy mode
###

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind P paste-buffer
bind-key v copy-mode

###
# Vendored plugins
###

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins"

set -g @yank_selection clipboard
set -g @yank_selection_mouse clipboard
set -g @yank_with_mouse on
set -g @yank_action copy-pipe-and-cancel
run-shell '$TMUX_PLUGIN_MANAGER_PATH/tmux-yank/yank.tmux'
bind F run-shell -b '$TMUX_PLUGIN_MANAGER_PATH/tmux-fzf/main.sh'
set -g @tmux2k-theme 'gruvbox'
set -g @tmux2k-icons-only false
set -g @tmux2k-left-plugins "session git cwd"
set -g @tmux2k-right-plugins "battery time"
set -g @tmux2k-refresh-rate 5
set -g @tmux2k-window-list-format '#I:#W'
set -g @tmux2k-window-list-alignment 'absolute-centre'
set -g @tmux2k-cwd-length 20
run-shell '$TMUX_PLUGIN_MANAGER_PATH/tmux2k/2k.tmux'

# Reserve a blank row above the status line. Preserve the rendered format on reload.
%if "#{!=:#{status-format[0]},}"
set -Fg 'status-format[1]' '#{status-format[0]}'
%endif
set -g 'status-format[0]' ''
set -g status 2

# Re-apply local copy bindings after tmux-yank loads.
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

###
# Window naming
###

setw -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# =============================================================================
# Helix Editor - config.toml
# Target: NixOS primary, Arch secondary, WSL fallback
# Copy to: ~/.config/helix/config.toml
# =============================================================================

# Primary theme.
# Quick switch:
#   :theme gruvbox
#   :theme catppuccin_mocha
theme = "nord"

[editor]
shell = ["sh", "-c"]
line-number = "relative"
mouse = true
middle-click-paste = true
scrolloff = 8
scroll-lines = 3
cursorline = true
cursorcolumn = false
color-modes = true
true-color = true
undercurl = true
bufferline = "multiple"
rulers = [80, 100, 120]
text-width = 100
popup-border = "all"
auto-completion = true
path-completion = true
auto-format = true
auto-info = true
idle-timeout = 250
completion-timeout = 150
completion-trigger-len = 2
completion-replace = false
preview-completion-insert = true
continue-comments = true
indent-heuristic = "hybrid"
insert-final-newline = true
atomic-save = true
trim-final-newlines = true
trim-trailing-whitespace = true
end-of-line-diagnostics = "hint"

# Clipboard:
# - Wayland: built-in "wayland" uses wl-copy/wl-paste.
# - X11: use "x-clip" or "x-sel".
# - WSL/Windows: use "windows" if available, otherwise define a custom provider.
# - Tmux/SSH fallback: "termcode" uses OSC52 when supported by terminal/mux.
# Omitted by default so Helix can auto-detect per host.
# clipboard-provider = "wayland"

# Helix 25.x does not expose a stable persistent-undo option in the documented
# editor table. If your build supports it, prefer enabling it in ~/.config/helix
# after checking `hx --health` / release notes for the exact key name.

[editor.statusline]
left = ["mode", "spinner", "file-name", "read-only-indicator", "file-modification-indicator"]
center = ["version-control"]
right = [
  "diagnostics",
  "workspace-diagnostics",
  "selections",
  "register",
  "position",
  "position-percentage",
  "file-encoding",
  "file-line-ending",
  "file-type",
]
separator = " | "
mode.normal = "NOR"
mode.insert = "INS"
mode.select = "SEL"
diagnostics = ["hint", "info", "warning", "error"]
workspace-diagnostics = ["warning", "error"]

[editor.lsp]
enable = true
display-messages = true
display-progress-messages = true
auto-signature-help = true
display-inlay-hints = true
display-color-swatches = true
display-signature-help-docs = true
snippets = true
goto-reference-include-declaration = true

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.file-picker]
hidden = false
follow-symlinks = true
deduplicate-links = true
parents = true
ignore = true
git-ignore = true
git-global = true
git-exclude = true

[editor.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
"'" = "'"
'`' = '`'

[editor.auto-save]
focus-lost = false

[editor.auto-save.after-delay]
enable = false
timeout = 3000

[editor.search]
smart-case = true
wrap-around = true

[editor.whitespace.render]
space = "none"
nbsp = "all"
nnbsp = "all"
tab = "all"
newline = "none"

[editor.whitespace.characters]
space = " "
nbsp = "⍽"
nnbsp = "␣"
tab = "→"
tabpad = "·"
newline = "⏎"

[editor.indent-guides]
render = true
character = "╎"
skip-levels = 1

[editor.gutters]
layout = ["diagnostics", "spacer", "line-numbers", "spacer", "diff"]

[editor.gutters.line-numbers]
min-width = 3

[editor.soft-wrap]
enable = false
max-wrap = 25
max-indent-retain = 40
wrap-indicator = "↪ "
wrap-at-text-width = false

[editor.smart-tab]
enable = true
supersede-menu = false

[editor.inline-diagnostics]
cursor-line = "warning"
other-lines = "disable"
prefix-len = 1
max-wrap = 20
max-diagnostics = 5

# =============================================================================
# Keybindings
# =============================================================================
# Zellij policy:
# - Keep Ctrl+h/j/k/l available to Helix.
# - Run Zellij in prefix mode so it does not steal Vim-style navigation.
# - All custom Zellij/Tmux/plain-terminal integrations live under Space.
#
# Current file expansions:
# - %{file_path_absolute}: absolute current file path, if supported by your Helix.
# - %{cursor_line}: 1-based cursor line.
# File-aware Git bindings call wrapper scripts so filenames are passed as argv,
# avoiding shell interpolation of path contents inside the actual Git commands.

[keys.normal]
"C-h" = "jump_view_left"
"C-j" = "jump_view_down"
"C-k" = "jump_view_up"
"C-l" = "jump_view_right"
tab = "move_parent_node_end"
"S-tab" = "move_parent_node_start"

[keys.insert]
"S-tab" = "move_parent_node_start"

[keys.select]
tab = "extend_parent_node_end"
"S-tab" = "extend_parent_node_start"

[keys.normal.space]
# Floating pane integrations.
y = ':sh if [ -n "$ZELLIJ" ]; then zellij run --floating --close-on-exit -- hx-yazi; elif [ -n "$TMUX" ]; then tmux display-popup -E "hx-yazi"; else hx-yazi; fi'
g = ':sh if [ -n "$ZELLIJ" ]; then zellij run --floating --close-on-exit -- lazygit; elif [ -n "$TMUX" ]; then tmux display-popup -E "lazygit"; else lazygit; fi'
b = ':sh if [ -n "$ZELLIJ" ]; then zellij run --floating --close-on-exit -- btop; elif [ -n "$TMUX" ]; then tmux display-popup -E "btop"; else btop; fi'
f = ':sh if [ -n "$ZELLIJ" ]; then zellij run --floating --close-on-exit -- hx-fzf; elif [ -n "$TMUX" ]; then tmux display-popup -E "hx-fzf"; else hx-fzf; fi'
t = ':sh if [ -n "$ZELLIJ" ]; then zellij run --floating --close-on-exit -- nu; elif [ -n "$TMUX" ]; then tmux display-popup -E "nu"; else nu; fi'

# Persistent adjacent panes. Some Zellij versions prefer `zellij action new-pane
# --direction down -- yazi`; if your build rejects `--`, remove it.
Y = ':sh if [ -n "$ZELLIJ" ]; then zellij action new-pane --direction down -- yazi; elif [ -n "$TMUX" ]; then tmux split-window -v yazi; else yazi; fi'
T = ':sh if [ -n "$ZELLIJ" ]; then zellij action new-pane --direction right -- nu; elif [ -n "$TMUX" ]; then tmux split-window -h nu; else nu; fi'

# Git workflow.
B = ':echo %sh{hx-git-blame-line "%{file_path_absolute}" "%{cursor_line}" 2>/dev/null || true}'
D = ':sh if [ -n "$ZELLIJ" ]; then zellij run --floating --close-on-exit -- hx-git-diff "%{file_path_absolute}"; elif [ -n "$TMUX" ]; then tmux display-popup -E "hx-git-diff \"%{file_path_absolute}\""; else hx-git-diff "%{file_path_absolute}"; fi'
L = ':sh if [ -n "$ZELLIJ" ]; then zellij run --floating --close-on-exit -- lazygit; elif [ -n "$TMUX" ]; then tmux display-popup -E "lazygit"; else lazygit; fi'
S = ':sh if [ -n "$ZELLIJ" ]; then zellij run --floating --close-on-exit -- sh -c "git status --short --branch; printf \"\nPress Enter...\"; read _"; elif [ -n "$TMUX" ]; then tmux display-popup -E "git status --short --branch; printf \"\nPress Enter...\"; read _"; else git status --short --branch; fi'
G = ':sh if [ -n "$ZELLIJ" ]; then zellij run --floating --close-on-exit -- sh -c "gh pr status || gh pr list"; elif [ -n "$TMUX" ]; then tmux display-popup -E "gh pr status || gh pr list"; else gh pr status || gh pr list; fi'
K = ':sh if [ -n "$ZELLIJ" ]; then zellij run --floating --close-on-exit -- sh -c "gitleaks detect --source . --verbose; printf \"\nPress Enter...\"; read _"; elif [ -n "$TMUX" ]; then tmux display-popup -E "gitleaks detect --source . --verbose; printf \"\nPress Enter...\"; read _"; else gitleaks detect --source . --verbose; fi'
H = ':sh if [ -n "$ZELLIJ" ]; then zellij run --floating --close-on-exit -- sh -c "lefthook run pre-commit; printf \"\nPress Enter...\"; read _"; elif [ -n "$TMUX" ]; then tmux display-popup -E "lefthook run pre-commit; printf \"\nPress Enter...\"; read _"; else lefthook run pre-commit; fi'

# Common project commands.
c = ":config-reload"
w = ":write"
q = ":quit"
F = ":format"
r = ':sh if [ -f justfile ] || [ -f Justfile ]; then just; elif [ -f Cargo.toml ]; then cargo run; elif [ -f package.json ]; then npm run dev; else printf "No known project runner found\n"; fi'
n = ':sh if [ -f flake.nix ]; then nix flake check; else printf "No flake.nix found\n"; fi'

  # ---------------------------------------------------------------------------
  # Tmux status line framework
  # ---------------------------------------------------------------------------

  # ===========================================================================
  # Wallpapers
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Wallpapers / Catppuccin
  # ---------------------------------------------------------------------------
  - path: dotfiles/.config/hypr/wallpapers/catppuccin
    contents:
      - path: .
        git:
          url: https://github.com/orangci/walls-catppuccin-mocha
          ref: origin/master
          depth: 1
          lfsSkipSmudge: true
          skipInitSubmodules: false
        includePaths:
          - "**/*.png"
          - "**/*.jpg"
          - "**/*.jpeg"

  # ---------------------------------------------------------------------------
  # Wallpapers / Graphite
  # ---------------------------------------------------------------------------
  - path: dotfiles/.config/hypr/wallpapers/graphite
    contents:
      - path: .
        git:
          url: https://github.com/vinceliuice/Graphite-gtk-theme
          ref: origin/main
          depth: 1
          lfsSkipSmudge: true
          skipInitSubmodules: true
        includePaths:
          - wallpaper/wallpapers/wave-color.jpg
          - wallpaper/wallpapers/wave-Dark.jpg
          - wallpaper/wallpapers/wave-Light.jpg
        newRootPath: wallpaper/wallpapers

  - path: dotfiles/.config/hypr/wallpapers/graphite-nord
    contents:
      - path: .
        git:
          url: https://github.com/vinceliuice/Graphite-gtk-theme
          ref: origin/main

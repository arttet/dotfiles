apiVersion: vendir.k14s.io/v1alpha1
kind: Config

directories:
  # ===========================================================================
  # Alacritty
  # ===========================================================================
  - path: dotfiles/.config/alacritty/themes
    contents:
      - path: themes
        git:
          url: https://github.com/alacritty/alacritty-theme
          ref: origin/master
          depth: 1
          lfsSkipSmudge: true
          skipInitSubmodules: true
        includePaths:
          - themes/catppuccin_frappe.toml
          - themes/catppuccin_latte.toml
          - themes/catppuccin_macchiato.toml
          - themes/catppuccin_mocha.toml

          - themes/gruvbox_dark.toml
          - themes/gruvbox_light.toml

          - themes/nord.toml
          - themes/nord_light.toml
        newRootPath: themes

  # ===========================================================================

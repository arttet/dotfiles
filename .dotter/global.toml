[helpers]
# =============================================================================
# Profile Groups
# =============================================================================
# These groups bundle related packages for easy deployment.

[default]
depends = ["agent", "editor", "shell", "terminal"]

[agent]
depends = ["claude", "codex", "kimi", "opencode"]

[editor]
depends = ["helix", "zed"]

[shell]
depends = ["bash", "powershell", "zsh"]

[terminal]
depends = ["alacritty", "windows-terminal"]

# =============================================================================
# Base Configuration
# =============================================================================

[default.files]
"dotfiles/.config" = "~/.config"

# =============================================================================
# Tools
# =============================================================================
# Each tool package can be deployed independently.
# Windows-only paths use `if = "dotter.windows"`.

# -----------------------------------------------------------------------------
# Terminal Emulators
# -----------------------------------------------------------------------------

[alacritty]
depends = []

[alacritty.files]
"dotfiles/.config/alacritty/alacritty.toml" = { target = "~\\AppData\\Roaming\\alacritty\\alacritty.toml", type = "symbolic", if = "dotter.windows" }

[windows-terminal]
depends = []

[windows-terminal.files]
"dotfiles/.config/windows-terminal/fragments/dotfiles.json" = { target = "~\\AppData\\Local\\Microsoft\\Windows Terminal\\Fragments\\dotfiles\\dotfiles.json", type = "symbolic", if = "dotter.windows" }

# -----------------------------------------------------------------------------
# Text Editors
# -----------------------------------------------------------------------------

[helix]
depends = []

[helix.files]
"dotfiles/.config/helix/config.toml" = { target = "~\\AppData\\Roaming\\helix\\config.toml", type = "symbolic", if = "dotter.windows" }
"dotfiles/.config/helix/languages.toml" = { target = "~\\AppData\\Roaming\\helix\\languages.toml", type = "symbolic", if = "dotter.windows" }

[zed]
depends = []

[zed.files]
"dotfiles/.config/zed/settings.json" = { target = "~\\AppData\\Roaming\\Zed\\settings.json", type = "symbolic", if = "dotter.windows" }

# -----------------------------------------------------------------------------
# AI Tools
# -----------------------------------------------------------------------------

[claude]
depends = []

[claude.files]
"dotfiles/.config/claude/CLAUDE.md" = { target = "~/.config/claude/CLAUDE.md", type = "symbolic" }
"dotfiles/.config/claude/keybindings.json" = { target = "~/.config/claude/keybindings.json", type = "symbolic" }
"dotfiles/.config/claude/settings.json" = { target = "~/.config/claude/settings.json", type = "symbolic" }
"dotfiles/.config/claude/statusline.sh" = { target = "~/.config/claude/statusline.sh", type = "symbolic" }

[codex]
depends = []

[codex.files]
"dotfiles/.config/codex/config.toml" = { target = "~/.config/codex/config.toml", type = "symbolic" }
"dotfiles/.config/codex/AGENTS.md" = { target = "~/.config/codex/AGENTS.md", type = "symbolic" }
"dotfiles/.config/codex/rules/default.rules" = { target = "~/.config/codex/rules/default.rules", type = "symbolic" }

[kimi]
depends = []

[kimi.files]
"dotfiles/.config/kimi-code/AGENTS.md" = "~/.config/kimi-code/AGENTS.md"
"dotfiles/.config/kimi-code/config.toml" = "~/.config/kimi-code/config.toml"
"dotfiles/.config/kimi-code/tui.toml" = "~/.config/kimi-code/tui.toml"
"dotfiles/.config/kimi-code/mcp.json" = "~/.config/kimi-code/mcp.json"
"dotfiles/.config/kimi-code/themes/nord.json" = "~/.config/kimi-code/themes/nord.json"

[opencode]
depends = []

[opencode.files]
"dotfiles/.config/opencode/AGENTS.md" = "~/.config/opencode/AGENTS.md"
"dotfiles/.config/opencode/opencode.jsonc" = "~/.config/opencode/opencode.jsonc"
"dotfiles/.config/opencode/tui.json" = "~/.config/opencode/tui.json"

# -----------------------------------------------------------------------------
# Shells
# -----------------------------------------------------------------------------

[bash]
depends = []

[bash.files]
"dotfiles/.bash_profile" = "~/.bash_profile"
"dotfiles/.bashrc" = "~/.bashrc"

[powershell]
depends = []

[powershell.files]
"dotfiles/.config/powershell/profile.ps1" = { target = "~\\OneDrive\\Documents\\PowerShell\\Microsoft.PowerShell_profile.ps1", type = "symbolic", if = "dotter.windows" }

[zsh]
depends = []

[zsh.files]
"dotfiles/.zshenv" = "~/.zshenv"

# =============================================================================
# Settings
# =============================================================================

[settings]
default_target_type = "symbolic"

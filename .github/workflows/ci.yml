name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read # Default read-only for all jobs

env:
  NIXPKGS: github:NixOS/nixpkgs/nixos-unstable

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Format Quality Gate
  # ---------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ github.job }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ github.job }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Download tools
        run: nix shell "$NIXPKGS#just" "$NIXPKGS#editorconfig-checker" "$NIXPKGS#dprint" "$NIXPKGS#stylua" "$NIXPKGS#shfmt" --command true

      - name: Check Justfile formatting
        run: nix shell "$NIXPKGS#just" --command just --fmt --check

      - name: Check EditorConfig formatting
        run: nix shell "$NIXPKGS#editorconfig-checker" --command editorconfig-checker

      - name: Format Check
        run: nix shell "$NIXPKGS#dprint" --command dprint check

      - name: Check Lua formatting
        run: nix shell "$NIXPKGS#stylua" --command stylua --allow-hidden --check .

      - name: Check shell formatting
        run: |
          # shellcheck disable=SC2016
          nix shell "$NIXPKGS#shfmt" --command bash -euo pipefail -c '
            shell_targets="dotfiles/.bashrc dotfiles/.bash_profile dotfiles/.config/bash dotfiles/.config/shell"
            shfmt --diff $(shfmt --find $shell_targets)
          '

  # ---------------------------------------------------------------------------
  # Stage 1: Lint Quality Gate
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ github.job }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ github.job }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Download tools
        run: |
          nix shell \
            "$NIXPKGS#yamllint" \
            "$NIXPKGS#actionlint" \
            "$NIXPKGS#shellcheck" \
            "$NIXPKGS#shfmt" \
            "$NIXPKGS#selene" \
            "$NIXPKGS#taplo" \
            "$NIXPKGS#zellij" \
            "$NIXPKGS#nushell" \
            "$NIXPKGS#markdownlint-cli2" \
            --command true

      - name: Lint YAML
        run: nix shell "$NIXPKGS#yamllint" --command yamllint .

      - name: Lint GitHub Actions
        run: nix shell "$NIXPKGS#actionlint" --command actionlint

      - name: Lint shell scripts
        run: |
          # shellcheck disable=SC2016
          nix shell "$NIXPKGS#shellcheck" "$NIXPKGS#shfmt" --command bash -euo pipefail -c '
            shell_targets="dotfiles/.bashrc dotfiles/.bash_profile dotfiles/.config/bash dotfiles/.config/shell"
            shellcheck -s bash $(shfmt --find $shell_targets)
          '

      - name: Lint Lua
        run: |
          # shellcheck disable=SC2016
          nix shell "$NIXPKGS#selene" --command bash -euo pipefail -c '
            selene dotfiles/.config/nvim dotfiles/.config/wezterm
            selene --config dotfiles/.config/hypr/selene.toml dotfiles/.config/hypr/hyprland.lua
          '

      - name: Lint TOML
        run: |
          # shellcheck disable=SC2016
          nix shell "$NIXPKGS#taplo" --command bash -euo pipefail -c '
            taplo lint --no-schema \
              $(find dotfiles/.config -type f -name "*.toml" \
                ! -path "*/node_modules/*" \
                ! -path "*/yazi/plugins/*" \
                ! -path "*/alacritty/themes/*")
          '

      - name: Lint Markdown
        run: nix shell "$NIXPKGS#markdownlint-cli2" --command markdownlint-cli2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Lint CSS
        run: bunx stylelint@16 --config .stylelintrc.json './dotfiles/.config/**/*.css'

      - name: Validate Zellij config
        run: |
          nix shell "$NIXPKGS#zellij" --command zellij --config "$PWD/dotfiles/.config/zellij/config.kdl" setup --dump-config >/dev/null

      - name: Validate Nushell config
        run: |
          nix shell "$NIXPKGS#nushell" --command nu --config dotfiles/.config/nushell/config.nu --env-config dotfiles/.config/nushell/env.nu -c "exit 0"

  # ---------------------------------------------------------------------------
  # Stage 1: Security
  # ---------------------------------------------------------------------------
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read # Default read-only for this job
      security-events: write # Required to upload security scan results to GitHub Security tab.

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@c1a1d6a28a601e902d8652e75425c4b3d3294053 # main
        with:
          extra_args: --results=verified,unknown

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          cache: "true"

      - name: Trivy SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: always()
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"
          severity: HIGH,CRITICAL
          cache: "true"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ---------------------------------------------------------------------------
  # Stage 1: Antivirus
  # ---------------------------------------------------------------------------
  antivirus:
    name: Antivirus
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ github.job }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ github.job }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Download tools
        run: nix shell "$NIXPKGS#clamav" --command true

      - name: Download ClamAV database
        run: |
          db_dir="$(mktemp -d)"
          config_file="$(mktemp)"
          printf '%s\n' \
            "DatabaseDirectory $db_dir" \
            "DatabaseMirror database.clamav.net" \
            >"$config_file"
          echo "CLAMAV_DB_DIR=$db_dir" >> "$GITHUB_ENV"
          nix shell "$NIXPKGS#clamav" --command freshclam --config-file="$config_file"
        env:
          LANG: C.UTF-8

      - name: Scan for malware
        run: nix shell "$NIXPKGS#clamav" --command clamscan --database="$CLAMAV_DB_DIR" -r --infected .
        env:
          LANG: C.UTF-8

  # ---------------------------------------------------------------------------
  # Stage 1: Documentation Gate
  # ---------------------------------------------------------------------------
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ github.job }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ github.job }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Restore Bun cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('docs/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Audit docs dependencies
        working-directory: docs
        run: bun audit

      - name: Build docs (Cloudflare Pages)
        working-directory: docs
        env:
          CI_BASE_URL: /
        run: bun run docs:build

      - name: Download tools
        run: nix shell "$NIXPKGS#lychee" --command true

      - name: Link Check
        run: |
          # shellcheck disable=SC2016
          nix shell "$NIXPKGS#lychee" --command bash -euo pipefail -c '
            lychee --config .lychee.toml --root-dir "$GITHUB_WORKSPACE/docs/.vitepress/dist" docs/.vitepress/dist
          '

      - name: Upload docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-cloudflare-pages
          path: docs/.vitepress/dist

      - name: Build docs (GitHub Pages)
        working-directory: docs
        env:
          CI_BASE_URL: /dotfiles/
        run: bun run docs:build

      # GitHub Pages requires the dedicated Pages artifact format.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          name: docs-github-pages
          path: docs/.vitepress/dist

  # ---------------------------------------------------------------------------
  # Stage 2: Validate application configs (one matrix entry per app)
  # ---------------------------------------------------------------------------
  validate:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [fmt, lint, security, antivirus, docs]

    strategy:
      fail-fast: false
      matrix:
        include:
          # Window manager
          - name: Hyprland
            app: hyprland
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#hyprland"'

          # Editors
          - name: Helix
            app: helix
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#helix"'

          - name: Neovim
            app: neovim
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#neovim" "$NIXPKGS#lua5_1" "$NIXPKGS#tree-sitter" "$NIXPKGS#gcc" "$NIXPKGS#ripgrep" "$NIXPKGS#fd"'

          # Terminals
          - name: Alacritty
            app: alacritty
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#alacritty" "$NIXPKGS#vendir"'

          - name: Ghostty
            app: ghostty
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#ghostty"'

          - name: WezTerm
            app: wezterm
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#wezterm"'

          # Shells
          - name: Bash
            app: bash
            deps: 'nix profile install "$NIXPKGS#just"'

          - name: Nushell
            app: nushell
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#nushell"'

          - name: PowerShell
            app: powershell
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#powershell"'

          - name: Zsh
            app: zsh
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#zsh"'

          # Shell tooling (prompt, multiplexer, file manager)
          - name: Starship
            app: starship
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#starship"'

          - name: Yazi
            app: yazi
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#yazi" "$NIXPKGS#vendir"'

          - name: Zellij
            app: zellij
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#zellij"'

          - name: Tmux
            app: tmux
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#tmux"'

          # Dotfiles management
          - name: Stow
            app: stow
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#stow" "$NIXPKGS#vendir"'

          # Version control
          - name: Git
            app: git
            deps: 'nix profile install "$NIXPKGS#just" "$NIXPKGS#git"'

          # Coding agents
          - name: Kimi
            app: kimi
            deps: 'nix profile install "$NIXPKGS#just" && npm install -g @moonshot-ai/kimi-code@latest'

          - name: OpenCode
            app: opencode
            deps: 'nix profile install "$NIXPKGS#just" && npm install -g opencode-ai@latest'

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ github.job }}-${{ matrix.app }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ github.job }}-${{ matrix.app }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ github.job }}-${{ matrix.app }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install ${{ matrix.name }} dependencies
        run: ${{ matrix.deps }}

      - name: Verify ${{ matrix.name }} config
        run: just validate ${{ matrix.app }}

  # ---------------------------------------------------------------------------
  # Stage 2: Performance regression gate
  # ---------------------------------------------------------------------------
  performance:
    name: Performance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [fmt, lint, security, antivirus, docs]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ github.job }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ github.job }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Install benchmark dependencies
        run: |
          nix profile install \
            "$NIXPKGS#just" \
            "$NIXPKGS#hyperfine" \
            "$NIXPKGS#bash" \
            "$NIXPKGS#zsh" \
            "$NIXPKGS#nushell" \
            "$NIXPKGS#tmux" \
            "$NIXPKGS#vendir" \
            "$NIXPKGS#jq"

      - name: Compare performance with baseline
        id: benchmark
        continue-on-error: true
        env:
          PERFORMANCE_REPORT: performance-report.md
        run: just bench ci

      - name: Add performance job summary
        if: always()
        run: |
          if [[ -f performance-report.md ]]; then
            cat performance-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Performance report"
              echo
              echo "**Failed:** benchmark did not produce a report."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish performance report
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: performance-regression
          path: performance-report.md

      - name: Enforce performance gate
        if: always() && steps.benchmark.outcome == 'failure'
        run: |
          echo "::error title=Performance regression gate failed::See the report below and in the job summary."
          if [[ -f performance-report.md ]]; then
            cat performance-report.md >&2
          else
            echo "Performance report was not generated." >&2
          fi
          exit 1

  # ---------------------------------------------------------------------------
  # Stage 2: Attest Build Provenance (non-PR only)
  # ---------------------------------------------------------------------------
  attest:
    name: Attest Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: docs
    if: github.event_name != 'pull_request'

    permissions:
      attestations: write # Required to create artifact attestations
      contents: read # Required to download the build artifact
      id-token: write # Required by Sigstore to sign attestations via OIDC

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download docs artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-cloudflare-pages
          path: docs/.vitepress/dist

      - name: Package docs output
        run: tar -czf docs-build.tar.gz -C docs/.vitepress/dist .

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: docs-build.tar.gz

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: docs/.vitepress/dist
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: docs-build.tar.gz
          sbom-path: sbom.spdx.json

  # ---------------------------------------------------------------------------
  # Stage 3: Cloudflare Preflight
  # ---------------------------------------------------------------------------
  cf-preflight:
    name: Cloudflare Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5

    needs: [fmt, lint, security, antivirus, docs, validate, performance]

    if: |
      github.event_name != 'schedule' &&
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true)

    outputs:
      enabled: ${{ steps.check.outputs.enabled }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check Cloudflare configuration
        id: check
        env:
          ENABLED: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && vars.CF_PAGES_PROJECT != '' }}
        run: echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Stage 3: Deploy Cloudflare Pages
  # ---------------------------------------------------------------------------
  deploy-cf-pages:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: needs.cf-preflight.outputs.enabled == 'true'
    needs: cf-preflight

    permissions:
      pull-requests: write # Required to post the Cloudflare Pages preview URL comment on PRs

    env:
      CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download docs artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-cloudflare-pages
          path: docs/.vitepress/dist

      - name: Deploy preview (pull request)
        if: ${{ github.event_name == 'pull_request' }}
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/.vitepress/dist --project-name=${{ env.CF_PAGES_PROJECT }} --branch=pr-${{ github.event.pull_request.number }} --commit-dirty=true

      - name: Deploy production (main)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/.vitepress/dist --project-name=${{ env.CF_PAGES_PROJECT }} --commit-dirty=true

      - name: Update sticky PR comment
        if: ${{ github.event_name == 'pull_request' && steps.deploy.outputs.pages-deployment-alias-url != '' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: cloudflare-preview
          message: |
            ## Cloudflare Pages Preview

            Deployed: ${{ steps.deploy.outputs.pages-deployment-alias-url }}

  # ---------------------------------------------------------------------------
  # Stage 3: Deploy to GitHub Pages (main only)
  # ---------------------------------------------------------------------------
  deploy-github-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5

    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'
    needs: cf-preflight

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        with:
          artifact_name: docs-github-pages

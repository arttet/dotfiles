name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # Daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Formatting
  # ---------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Check Justfile formatting
        run: just --fmt --check

      - name: Check formatting (dprint)
        uses: dprint/check@v2.3

      - name: Check Lua formatting (stylua)
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

      - name: Setup shfmt
        uses: mfinelli/setup-shfmt@v4

      - name: Check shell formatting (shfmt)
        run: shfmt --diff dotfiles/.bashrc dotfiles/.bash_profile dotfiles/.config/bash dotfiles/.config/shell

  # ---------------------------------------------------------------------------
  # Stage 1: Linting
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: ./dotfiles/.config/shell
        env:
          SHELLCHECK_OPTS: -s bash -e SC1090 -e SC1091

      - name: Install selene
        uses: taiki-e/install-action@v2
        with:
          tool: selene

      - name: Lint Lua
        run: selene dotfiles/.config/nvim

      - name: Lint workflows
        uses: raven-actions/actionlint@v2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Lint YAML
        run: |
          pip install --quiet yamllint
          yamllint .

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

  # ---------------------------------------------------------------------------
  # Stage 1: Security Scanning
  # ---------------------------------------------------------------------------
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

      - name: Trivy filesystem scan
        # Pinned from aquasecurity/trivy-action@v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scanners: secret,misconfig
          exit-code: "1"
          severity: HIGH,CRITICAL
          cache: "true"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Semgrep
        run: pip install --quiet semgrep

      - name: Semgrep
        run: semgrep scan --config p/default --error

  # ---------------------------------------------------------------------------
  # Stage 1: Build Documentation
  # ---------------------------------------------------------------------------
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('docs/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install docs dependencies
        run: bun --bun install --cwd docs --frozen-lockfile

      - name: Build docs
        run: bun --bun run --cwd docs docs:build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages
          path: docs/.vitepress/dist

  # ---------------------------------------------------------------------------
  # Stage 2: Build & Package
  # ---------------------------------------------------------------------------
  build:
    name: Build & Package
    needs: [fmt, lint, security]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y stow unzip

      - name: Install Vendir

        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo carvel-dev/vendir --pattern 'vendir-linux-amd64'
          chmod +x vendir-linux-amd64
          sudo mv vendir-linux-amd64 /usr/local/bin/vendir

      - name: Install Neovim
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo neovim/neovim --pattern 'nvim-linux-x86_64.tar.gz'
          tar -xzf nvim-linux-x86_64.tar.gz
          sudo mv nvim-linux-x86_64/bin/nvim /usr/local/bin/
          sudo cp -r nvim-linux-x86_64/share/* /usr/local/share/
          sudo cp -r nvim-linux-x86_64/lib/* /usr/local/lib/

      - name: Install Nushell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo nushell/nushell --pattern 'nu-*-x86_64-unknown-linux-gnu.tar.gz'
          tar -xzf nu-*-x86_64-unknown-linux-gnu.tar.gz
          sudo mv nu-*-x86_64-unknown-linux-gnu/nu* /usr/local/bin/

      - name: Install Starship
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo starship/starship --pattern 'starship-x86_64-unknown-linux-gnu.tar.gz'
          tar -xzf starship-x86_64-unknown-linux-gnu.tar.gz
          sudo mv starship /usr/local/bin/

      - name: Install Yazi
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo sxyazi/yazi --pattern 'yazi-x86_64-unknown-linux-gnu.zip'
          unzip yazi-x86_64-unknown-linux-gnu.zip
          sudo mv yazi-x86_64-unknown-linux-gnu/yazi /usr/local/bin/
          sudo mv yazi-x86_64-unknown-linux-gnu/ya /usr/local/bin/

      - name: Install Zellij
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo zellij-org/zellij --pattern 'zellij-x86_64-unknown-linux-musl.tar.gz'
          tar -xzf zellij-x86_64-unknown-linux-musl.tar.gz
          sudo mv zellij /usr/local/bin/

      - name: Cleanup installation files
        run: |
          rm -rf ./*.tar.gz ./*.zip nvim-linux-x86_64 nu-*-x86_64-unknown-linux-gnu yazi-x86_64-unknown-linux-gnu starship zellij

      - name: Sync dependencies
        run: vendir sync

      - name: Link dotfiles (stow)
        run: |
          # Remove existing bash configs that cause conflicts in CI
          rm -f "$HOME/.bashrc" "$HOME/.bash_profile"
          stow -v --target="${HOME}" dotfiles

      - name: Verify configuration paths
        run: |
          # shellcheck disable=SC2016
          echo "🔍 Verifying configuration paths..."

          # Neovim
          NVIM_CONFIG=$(nvim --headless -c 'lua print(vim.fn.stdpath("config"))' -c 'q' 2>&1 | tail -n 1)
          echo "Neovim config: $NVIM_CONFIG"
          test "$NVIM_CONFIG" = "$HOME/.config/nvim" || (echo "❌ Neovim config path mismatch" && exit 1)
          test -f "$NVIM_CONFIG/init.lua" || (echo "❌ Neovim init.lua not found" && exit 1)

          # Nushell
          # shellcheck disable=SC2016
          NU_CONFIG=$(nu -c 'echo $nu.config-path')
          echo "Nushell config: $NU_CONFIG"
          echo "$NU_CONFIG" | grep -q ".config/nushell/config.nu" || (echo "❌ Nushell config path mismatch" && exit 1)

          # Starship
          test -f "$HOME/.config/starship/starship.toml" || (echo "❌ Starship config not found" && exit 1)

          # Yazi
          test -d "$HOME/.config/yazi" || (echo "❌ Yazi config directory not found" && exit 1)
          test -f "$HOME/.config/yazi/yazi.toml" || (echo "❌ yazi.toml not found" && exit 1)

          # Zellij
          test -f "$HOME/.config/zellij/config.kdl" || (echo "❌ Zellij config not found" && exit 1)

          # Functional checks
          echo "🚀 Running functional checks..."

          # Neovim: Check for syntax errors (ignoring missing modules/plugins)
          nvim --headless -u NONE -c "lua local _, err = loadfile(os.getenv('HOME') .. '/.config/nvim/init.lua'); if err then print(err); os.exit(1) end" -c "q" || (echo "❌ Neovim configuration syntax error" && exit 1)

          # Starship: Check if it can render a prompt
          starship prompt > /dev/null || (echo "❌ Starship failed to render prompt" && exit 1)

          # Nushell: Simple command execution
          nu -c "print 'Nushell is working'" || (echo "❌ Nushell functional check failed" && exit 1)

          # Yazi: Version check
          yazi --version || (echo "❌ Yazi functional check failed" && exit 1)
          yazi --debug || (echo "❌ Ya functional check failed" && exit 1)

          # Zellij: Version check
          zellij --version || (echo "❌ Zellij functional check failed" && exit 1)

          # Bash (Stow check)
          test -L "$HOME/.bashrc" || (echo "❌ .bashrc symlink missing" && exit 1)

          echo "✅ All configurations verified!"

      - name: Create archive
        run: tar -czvf dotfiles.tar.gz dotfiles/

      - name: Verify archive content
        run: |
          echo "🔍 Verifying archive content..."
          tar -tf dotfiles.tar.gz | grep "dotfiles/.config/alacritty/themes/themes/catppuccin_mocha.toml"
          tar -tf dotfiles.tar.gz | grep "dotfiles/.config/nvim/init.lua"
          echo "✅ Archive content verified!"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotfiles-archive
          path: dotfiles.tar.gz

  # ---------------------------------------------------------------------------
  # Stage 3: Deploy to GitHub Pages (main only)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: [docs, build]
    # Deploy only on direct pushes to main — never on the nightly schedule.
    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
